coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: unit
      paths:
        - crates/server/src/
    - name: integration
      paths:
        - crates/server/src/

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
  individual_components:
    - component_id: cache
      name: Cache
      paths:
        - crates/server/src/entity_cache.rs
        - crates/server/src/storage.rs
        - crates/server/src/entity.rs
        - crates/server/src/key.rs
        - crates/server/src/ttl.rs
    - component_id: classify
      name: Classify
      paths:
        - crates/server/src/classify.rs
    - component_id: proxy
      name: Proxy
      paths:
        - crates/server/src/proxy.rs
    - component_id: server
      name: Server
      paths:
        - crates/server/src/server.rs
        - crates/server/src/main.rs
    - component_id: error
      name: Error
      paths:
        - crates/server/src/error.rs
