on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip release-please, run build+deploy for existing tag'
        type: boolean
        default: false
      tag_name:
        description: 'Tag name to deploy (required if deploy_only=true, e.g. local-hub-v0.4.0)'
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write

name: release

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    if: ${{ !inputs.deploy_only }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['crates/server--release_created'] }}
      tag_name: ${{ steps.release.outputs['crates/server--tag_name'] }}
      version: ${{ steps.release.outputs['crates/server--version'] }}
    steps:
      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-binaries:
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created || inputs.deploy_only) }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: local-hub-darwin-x64
            npm-dir: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: local-hub-darwin-arm64
            npm-dir: darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: local-hub-linux-x64
            npm-dir: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: local-hub-linux-arm64
            npm-dir: linux-arm64

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          CODENAME=$(lsb_release -cs)

          # Replace all apt sources with explicit arch-pinned config
          sudo rm -f /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources
          sudo tee /etc/apt/sources.list > /dev/null <<EOF
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu ${CODENAME} main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu ${CODENAME}-updates main restricted universe multiverse
          deb [arch=amd64] http://security.ubuntu.com/ubuntu ${CODENAME}-security main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME} main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME}-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME}-security main restricted universe multiverse
          EOF

          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_SYSROOT_DIR: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '/usr/aarch64-linux-gnu' || '' }}
          PKG_CONFIG_PATH: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
        run: cargo build --release --target ${{ matrix.target }} -p local-hub

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/local-hub dist/local-hub
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz local-hub
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz*

      - name: Prepare npm package
        run: |
          mkdir -p npm-pkg/bin
          cp target/${{ matrix.target }}/release/local-hub npm-pkg/bin/local-hub
          cp npm/${{ matrix.npm-dir }}/package.json npm-pkg/package.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-${{ matrix.npm-dir }}
          path: npm-pkg/

  upload-release-assets:
    needs: [release-please, build-binaries]
    if: ${{ always() && (needs.release-please.outputs.release_created || inputs.deploy_only) }}
    runs-on: ubuntu-latest
    env:
      RESOLVED_TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ env.RESOLVED_TAG }} \
            artifacts/* \
            --clobber

  npm-publish:
    needs: [release-please, build-binaries]
    if: ${{ always() && (needs.release-please.outputs.release_created || inputs.deploy_only) }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    strategy:
      matrix:
        npm-dir: [darwin-arm64, darwin-x64, linux-arm64, linux-x64]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-${{ matrix.npm-dir }}
          path: pkg

      - run: chmod +x pkg/bin/local-hub

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - run: npm publish --provenance --access public
        working-directory: pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  npm-publish-main:
    needs: [release-please, npm-publish]
    if: ${{ always() && (needs.release-please.outputs.release_created || inputs.deploy_only) }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - run: npm publish --provenance --access public
        working-directory: npm/local-hub
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew-formula:
    needs: [release-please, upload-release-assets]
    if: ${{ always() && (needs.release-please.outputs.release_created || inputs.deploy_only) }}
    runs-on: ubuntu-latest
    env:
      RESOLVED_TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          repositories: |
            local-hub
            homebrew-tap

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: pleaseai/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap

      - name: Configure git
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update Formula
        run: |
          TAG_NAME=${{ env.RESOLVED_TAG }}
          VERSION_NO_V=${TAG_NAME#local-hub-v}

          # Download checksums
          for target in darwin-x64 darwin-arm64 linux-x64 linux-arm64; do
            curl -L -o ${target}.sha256 \
              "https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/local-hub-${target}.tar.gz.sha256"
          done

          DARWIN_X64_SHA256=$(awk '{print $1}' darwin-x64.sha256)
          DARWIN_ARM64_SHA256=$(awk '{print $1}' darwin-arm64.sha256)
          LINUX_X64_SHA256=$(awk '{print $1}' linux-x64.sha256)
          LINUX_ARM64_SHA256=$(awk '{print $1}' linux-arm64.sha256)

          cd homebrew-tap
          cat > local-hub.rb << 'FORMULA_EOF'
          class LocalHub < Formula
            desc "Local GitHub API cache proxy — reduce latency and save rate limits"
            homepage "https://github.com/pleaseai/local-hub"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/pleaseai/local-hub/releases/download/TAG_NAME_PLACEHOLDER/local-hub-darwin-arm64.tar.gz"
                sha256 "SHA256_DARWIN_ARM64_PLACEHOLDER"
              else
                url "https://github.com/pleaseai/local-hub/releases/download/TAG_NAME_PLACEHOLDER/local-hub-darwin-x64.tar.gz"
                sha256 "SHA256_DARWIN_X64_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/pleaseai/local-hub/releases/download/TAG_NAME_PLACEHOLDER/local-hub-linux-arm64.tar.gz"
                sha256 "SHA256_LINUX_ARM64_PLACEHOLDER"
              else
                url "https://github.com/pleaseai/local-hub/releases/download/TAG_NAME_PLACEHOLDER/local-hub-linux-x64.tar.gz"
                sha256 "SHA256_LINUX_X64_PLACEHOLDER"
              end
            end

            def install
              bin.install "local-hub"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/local-hub --version")
            end
          end
          FORMULA_EOF

          sed -i "s/VERSION_PLACEHOLDER/${VERSION_NO_V}/g" local-hub.rb
          sed -i "s/TAG_NAME_PLACEHOLDER/${TAG_NAME}/g" local-hub.rb
          sed -i "s/SHA256_DARWIN_X64_PLACEHOLDER/${DARWIN_X64_SHA256}/" local-hub.rb
          sed -i "s/SHA256_DARWIN_ARM64_PLACEHOLDER/${DARWIN_ARM64_SHA256}/" local-hub.rb
          sed -i "s/SHA256_LINUX_X64_PLACEHOLDER/${LINUX_X64_SHA256}/" local-hub.rb
          sed -i "s/SHA256_LINUX_ARM64_PLACEHOLDER/${LINUX_ARM64_SHA256}/" local-hub.rb

          if git diff --quiet local-hub.rb 2>/dev/null; then
            echo "No changes to Formula"
            exit 0
          fi

          git add local-hub.rb
          git commit -m "chore: update local-hub to ${TAG_NAME}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
